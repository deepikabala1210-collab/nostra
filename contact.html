<!doctype html>
<html lang="en">
	  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Nostra</title>
    <!-- Google font style sheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- My Stylehsheet -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome CDN Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind Css -->
    <link
      href="
https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css
"
      rel="stylesheet"
    />
    <style>
      .mobile-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 80%;
        height: 100vh;
        background: white;
        z-index: 20;
        transition: right 0.3s ease;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
      }
      .mobile-menu.active {
        right: 0;
      }
      .mobile-menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 15;
        display: none;
      }
      .mobile-menu-overlay.active {
        display: block;
      }
      .mobile-menu ul {
        list-style: none;
        padding: 20px 0;
      }
      .mobile-menu li {
        padding: 15px 20px;
        border-bottom: 1px solid #e5e7eb;
      }
      .mobile-menu a {
        text-decoration: none;
        font-weight: 600;
        display: block;
      }
    </style>
  </head>
	 <!-- Nav Bar -->
    <nav
      class="p-3 flex justify-between items-center bg-white position: sticky top-0 z-10"
    >
      <a href="index.html" class="text-3xl font-extrabold text-pink-500">Nostra</a>

      <svg
        id="menuicon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-8 h-8 md:hidden text-pink-500"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>

      <ul class="flex gap-10 text-gray-600 hidden md:flex">
        <li>
          <a href="index.html" class="hover:underline hover:text-black text-pink-500">Home</a>
        </li>
        <li>
          <a
            href="index.html#new-arrivals-section"
            class="hover:underline hover:text-black text-purple-500"
            >New Arrival</a
          >
        </li>
        <li>
          <a
            href="index.html#most-wanted-section"
            class="hover:underline hover:text-black text-pink-500"
            >Most Wanted</a
          >
        </li>
        <li>
          <a
            href="collections.html"
            class="hover:underline hover:text-black text-purple-500"
            >Collections</a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="hover:underline hover:text-black text-pink-500"
            >Contact Us</a
          >
        </li>
      </ul>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="menuOverlay"></div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li>
          <a href="index.html" class="text-pink-500">Home</a>
        </li>
        <li>
          <a href="index.html#new-arrivals-section" class="text-purple-500">New Arrival</a>
        </li>
        <li>
          <a href="index.html#most-wanted-section" class="text-pink-500">Most Wanted</a>
        </li>
        <li>
          <a href="collections.html" class="text-purple-500">Collections</a>
        </li>
        <li>
          <a href="contact.html" class="text-pink-500">Contact Us</a>
        </li>
      </ul>
    </div>

	<body class="font-poppins">
		<section class="contact-section">
			<div class="contact-inner max-w-6xl mx-auto px-6 py-16 bg-pink-500">
				<h2 class="contact-title text-3xl font-extrabold mb-8">Contact Us</h2>

				<form class="contact-form" action="#" method="post">
					<label class="field-label">Name:</label>
					<input type="text" name="name" class="field-input" placeholder="Your name" required />

					<label class="field-label">Email:</label>
					<input type="email" name="email" class="field-input" placeholder="you@example.com" required />

					<label class="field-label">Message:</label>
					<textarea name="message" class="field-textarea" rows="8" placeholder="Write your message..." required></textarea>

					<button type="submit" class="field-submit">Submit</button>
				</form>
			</div>
		</section>
		  <!-- Footer -->
    <footer class="footer-section px-6 py-12 bg-purple-200">
      <div class="max-w-6xl mx-auto text-pink-500">
        <h1 class="footer-logo text-4xl font-extrabold mb-4 text-pink-500">Nostra</h1>
        <p class="footer-desc text-xl mb-6 text-pink-500">The Standard chunk of Lorem ipsum used since the 1500s is reproduced below for those interest</p>

        <div class="footer-social flex items-center gap-8 mb-8 text-pink-500">
          <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
          <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
          <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
        </div>

        <div class="footer-copy text-2xl">@ 2026 Nostra.com</div>
      </div>
    </footer>

    <script>
      // Mobile Menu Toggle
      const menuIcon = document.getElementById('menuicon');
      const mobileMenu = document.getElementById('mobileMenu');
      const menuOverlay = document.getElementById('menuOverlay');

      // Toggle menu when hamburger icon is clicked
      menuIcon.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
      });

      // Close menu when overlay is clicked
      menuOverlay.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
        menuOverlay.classList.remove('active');
      });

      // Close menu when a link is clicked
      const mobileMenuLinks = document.querySelectorAll('.mobile-menu a');
      mobileMenuLinks.forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.remove('active');
          menuOverlay.classList.remove('active');
        });
      });
    </script>
	</body>
</html>
